---
HOSTS:
  alma10:
    roles:
    - default
    - master
    - server
    - 389ds
    - el10
    platform: el-10-x86_64
    hypervisor: docker
    image: almalinux:10
    docker_cmd: '/usr/sbin/init'
    docker_preserve_image: true
    docker_image_commands:
      - 'yum install -y rsync openssl openssh-server hostname'
    dockeropts:
      HostConfig:
        Privileged: true
        ShmSize: 2147483648
CONFIG:
  log_level: verbose
  type: aio
  puppet_collection: "<%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'openvox8') %>"
